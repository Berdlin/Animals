<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feral Pursuit - Identity</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&family=Cinzel:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #ccc;
            font-family: 'Courier Prime', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .scanner-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 10px #0f0;
            animation: scan 3s infinite linear;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .container {
            z-index: 10;
            width: 90%;
            max-width: 500px;
            text-align: left;
            padding: 40px;
            margin: 50px 0;
            border: 1px solid #333;
            background-color: rgba(10, 15, 10, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #ddd;
            font-size: 2em;
            border-bottom: 2px solid #ff4500;
            padding-bottom: 10px;
            margin-top: 0;
        }

        label {
            display: block;
            margin-top: 20px;
            color: #ff4500;
            font-size: 0.9em;
            letter-spacing: 2px;
        }

        .warning-text {
            font-size: 0.75em;
            color: #888;
            margin-top: 5px;
            font-style: italic;
            border-left: 2px solid #555;
            padding-left: 10px;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: #000;
            border: 1px solid #444;
            color: #0f0;
            font-family: 'Courier Prime', monospace;
            font-size: 1.2em;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #0f0;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin-top: 30px;
            background-color: #1a1a1a;
            color: #fff;
            border: 1px solid #ff4500;
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ff4500;
            color: #000;
        }

        #error-message {
            color: #ff0000;
            margin-top: 15px;
            min-height: 20px;
        }

        #success-message {
            color: #00ff00;
            margin-top: 15px;
            min-height: 20px;
        }
    </style>
</head>

<body>
    <div class="scanner-line"></div>
    <div class="container">
        <h1>SINGLE PLAYER MODE</h1>
        <p style="font-size: 0.8em; color: #666;">SERVER: LOCAL_SYS_01<br>STATUS: READY FOR DEPLOYMENT</p>

        <label>ENTER CALLSIGN</label>
        <p class="warning-text">
            NOTE: Your callsign will be displayed in-game and on leaderboards.
        </p>
        <input type="text" id="singlePlayerUsername" placeholder="CALLSIGN..." autocomplete="off">

        <button class="btn" onclick="startSinglePlayer()">DEPLOY</button>
        <p id="error-message"></p>
        <p id="success-message"></p>

        <a href="index.html" style="color:#444; text-decoration: none; font-size: 0.8em;">[ RETURN TO BASE ]</a>
    </div>

    <script>
        async function startSinglePlayer() {
            const inputField = document.getElementById('singlePlayerUsername');
            const username = inputField.value.trim();
            const errorMessage = document.getElementById('error-message');
            const successMessage = document.getElementById('success-message');

            if (username.length === 0) {
                errorMessage.textContent = '>> ERROR: NULL CALLSIGN DETECTED';
                successMessage.textContent = '';
                return;
            }

            // Get authenticated username from session
            try {
                const response = await fetch('/api/auth/session');
                const data = await response.json();
                
                if (data.authenticated) {
                    // Use the authenticated username but allow custom callsign for display
                    localStorage.setItem('gameUsername', username);
                    localStorage.setItem('authenticatedUser', data.username);
                    
                    successMessage.textContent = '>> IDENTITY CONFIRMED. DEPLOYING...';
                    errorMessage.textContent = '';
                    
                    setTimeout(() => {
                        window.location.href = 'realgame.html';
                    }, 1000);
                } else {
                    errorMessage.textContent = '>> ERROR: AUTHENTICATION REQUIRED';
                    successMessage.textContent = '';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                }
            } catch (error) {
                errorMessage.textContent = '>> ERROR: CONNECTION FAILED';
                console.error('Session check error:', error);
            }
        }

        // Check authentication on page load
        window.onload = async function() {
            try {
                const response = await fetch('/api/auth/session');
                const data = await response.json();
                
                if (!data.authenticated) {
                    document.getElementById('error-message').textContent = '>> ERROR: AUTHENTICATION REQUIRED';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                }
            } catch (error) {
                console.error('Session check error:', error);
            }
        };
    </script>
</body>

</html>
