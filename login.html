<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feral Pursuit - Access</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&family=Cinzel:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #ccc;
            font-family: 'Courier Prime', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }

        .scanner-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 10px #0f0;
            animation: scan 3s infinite linear;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        .container {
            z-index: 10;
            width: 90%;
            max-width: 500px;
            text-align: left;
            padding: 40px;
            margin: 50px 0;
            border: 1px solid #333;
            background-color: rgba(10, 15, 10, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #ddd;
            font-size: 2em;
            border-bottom: 2px solid #ff4500;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .tab-buttons {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
        }

        .tab-btn {
            flex: 1;
            padding: 15px;
            background: transparent;
            border: none;
            color: #666;
            font-family: 'Cinzel', serif;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #ff4500;
            border-bottom: 2px solid #ff4500;
        }

        .tab-btn:hover {
            color: #ff4500;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        label {
            display: block;
            margin-top: 20px;
            color: #ff4500;
            font-size: 0.9em;
            letter-spacing: 2px;
        }

        .warning-text {
            font-size: 0.75em;
            color: #888;
            margin-top: 5px;
            font-style: italic;
            border-left: 2px solid #555;
            padding-left: 10px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: #000;
            border: 1px solid #444;
            color: #0f0;
            font-family: 'Courier Prime', monospace;
            font-size: 1.2em;
            box-sizing: border-box;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #0f0;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.2);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin-top: 30px;
            background-color: #1a1a1a;
            color: #fff;
            border: 1px solid #ff4500;
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #ff4500;
            color: #000;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #error-message {
            color: #ff0000;
            margin-top: 15px;
            min-height: 20px;
            font-size: 0.9em;
        }

        #success-message {
            color: #00ff00;
            margin-top: 15px;
            min-height: 20px;
            font-size: 0.9em;
        }
    </style>
</head>

<body>
    <div class="scanner-line"></div>
    <div class="container">
        <h1>ACCESS CONTROL</h1>
        <p style="font-size: 0.8em; color: #666;">SERVER: NEON_DB_SECURE<br>STATUS: AUTHENTICATION REQUIRED</p>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('login')">LOGIN</button>
            <button class="tab-btn" onclick="switchTab('register')">REGISTER</button>
        </div>

        <!-- Login Tab -->
        <div id="login-tab" class="tab-content active">
            <label>USERNAME</label>
            <input type="text" id="loginUsername" placeholder="ENTER USERNAME..." autocomplete="off">

            <label>PASSWORD</label>
            <input type="password" id="loginPassword" placeholder="ENTER PASSWORD...">

            <button class="btn" onclick="login()" id="loginBtn">AUTHENTICATE</button>
            <p id="error-message"></p>
            <p id="success-message"></p>
        </div>

        <!-- Register Tab -->
        <div id="register-tab" class="tab-content">
            <label>USERNAME</label>
            <p class="warning-text">
                NOTE: Choose a unique identifier for your profile.
            </p>
            <input type="text" id="registerUsername" placeholder="CHOOSE USERNAME..." autocomplete="off">

            <label>PASSWORD</label>
            <p class="warning-text">
                NOTE: Minimum 6 characters required for security.
            </p>
            <input type="password" id="registerPassword" placeholder="CREATE PASSWORD...">

            <label>CONFIRM PASSWORD</label>
            <input type="password" id="registerConfirmPassword" placeholder="CONFIRM PASSWORD...">

            <button class="btn" onclick="register()" id="registerBtn">CREATE ACCOUNT</button>
            <p id="error-message"></p>
            <p id="success-message"></p>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelector('.tab-btn:first-child').classList.add('active');
                document.getElementById('login-tab').classList.add('active');
            } else {
                document.querySelector('.tab-btn:last-child').classList.add('active');
                document.getElementById('register-tab').classList.add('active');
            }
            
            clearMessages();
        }

        function clearMessages() {
            document.getElementById('error-message').textContent = '';
            document.getElementById('success-message').textContent = '';
        }

        function showError(message) {
            document.getElementById('error-message').textContent = message;
            document.getElementById('success-message').textContent = '';
        }

        function showSuccess(message) {
            document.getElementById('success-message').textContent = message;
            document.getElementById('error-message').textContent = '';
        }

        async function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            const btn = document.getElementById('registerBtn');

            if (!username || !password || !confirmPassword) {
                showError('>> ERROR: ALL FIELDS REQUIRED');
                return;
            }

            if (password.length < 6) {
                showError('>> ERROR: PASSWORD MUST BE AT LEAST 6 CHARACTERS');
                return;
            }

            if (password !== confirmPassword) {
                showError('>> ERROR: PASSWORDS DO NOT MATCH');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'PROCESSING...';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('>> ACCOUNT CREATED SUCCESSFULLY. REDIRECTING TO MAIN MENU...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    showError(`>> ERROR: ${data.error}`);
                }
            } catch (error) {
                showError('>> ERROR: CONNECTION FAILED');
                console.error('Registration error:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = 'CREATE ACCOUNT';
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!username || !password) {
                showError('>> ERROR: USERNAME AND PASSWORD REQUIRED');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'AUTHENTICATING...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showSuccess('>> AUTHENTICATION SUCCESSFUL. REDIRECTING...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showError(`>> ERROR: ${data.error}`);
                }
            } catch (error) {
                showError('>> ERROR: CONNECTION FAILED');
                console.error('Login error:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = 'AUTHENTICATE';
            }
        }

        // Check if already authenticated on page load
        window.onload = async function() {
            try {
                const response = await fetch('/api/auth/session');
                const data = await response.json();
                
                if (data.authenticated) {
                    showSuccess('>> SESSION ACTIVE. REDIRECTING...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                }
            } catch (error) {
                console.error('Session check error:', error);
            }
        };
    </script>
</body>

</html>
