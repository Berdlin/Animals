<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feral Pursuit - Statistics Dashboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            background-image: radial-gradient(circle at center, #1a0a0a 0%, #000000 100%);
            color: #e0e0e0;
            font-family: 'Lato', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background-fx {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            opacity: 0.3;
            animation: pulseBg 10s infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            width: 90%;
            text-align: center;
            padding: 40px;
            border: 2px solid #500;
            background-color: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
            border-radius: 4px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #ff4500;
            font-size: 3em;
            text-shadow: 0 0 15px rgba(255, 69, 0, 0.7);
            margin-bottom: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: #110;
            border: 1px solid #ffd700;
            padding: 20px;
            color: #ffd700;
            font-family: 'Cinzel', serif;
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.1);
            border-radius: 4px;
        }

        .stat-box.global {
            background: #0a111a;
            border-color: #00bfff;
            color: #00bfff;
            box-shadow: 0 0 10px rgba(0, 191, 255, 0.2);
        }

        .stat-label {
            font-size: 0.8em;
            letter-spacing: 1px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .loading {
            color: #888;
            font-size: 1.2em;
            padding: 40px;
        }

        .error {
            color: #ff6347;
            font-size: 1.2em;
            padding: 40px;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #300;
            color: #fff;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            border: 2px solid #ff4500;
            border-radius: 5px;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #ff4500;
            color: #000;
        }

        @keyframes pulseBg {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="background-fx"></div>
    <div class="container">
        <h1>📊 GLOBAL STATISTICS 📊</h1>
        
        <div id="loadingMessage" class="loading">Loading statistics...</div>
        <div id="errorMessage" class="error" style="display: none;"></div>
        
        <div class="stats-grid" id="statsGrid" style="display: none;">
            <div class="stat-box global">
                <div class="stat-label">TOTAL PLAYERS</div>
                <div class="stat-value" id="totalPlayers">0</div>
            </div>
            <div class="stat-box global">
                <div class="stat-label">TOTAL RECORDS</div>
                <div class="stat-value" id="totalRecords">0</div>
            </div>
            <div class="stat-box global">
                <div class="stat-label">WORLD RECORD</div>
                <div class="stat-value" id="worldRecord">0</div>
                <div class="stat-label">DAYS</div>
            </div>
            <div class="stat-box global">
                <div class="stat-label">AVERAGE SURVIVAL</div>
                <div class="stat-value" id="avgSurvival">0</div>
                <div class="stat-label">DAYS</div>
            </div>
            <div class="stat-box global">
                <div class="stat-label">TOTAL DAYS SURVIVED</div>
                <div class="stat-value" id="totalDays">0</div>
            </div>
            <div class="stat-box global">
                <div class="stat-label">ACTIVE PLAYERS (24H)</div>
                <div class="stat-value" id="activePlayers">0</div>
            </div>
        </div>

        <div class="btn-group">
            <a href="index.html" class="btn">Return to Main Menu</a>
            <a href="leaderboard.html" class="btn" style="border-color: #ffd700;">🏆 Leaderboard</a>
            <button class="btn" onclick="refreshStats()">Refresh</button>
        </div>
    </div>

    <script>
        async function fetchStats() {
            const loadingMsg = document.getElementById('loadingMessage');
            const errorMsg = document.getElementById('errorMessage');
            const statsGrid = document.getElementById('statsGrid');

            loadingMsg.style.display = 'block';
            errorMsg.style.display = 'none';
            statsGrid.style.display = 'none';

            try {
                // Fetch all records for statistics
                const response = await fetch('/api/leaderboard?limit=1000');
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                loadingMsg.style.display = 'none';
                statsGrid.style.display = 'grid';

                // Calculate statistics
                const totalRecords = data.length;
                const uniquePlayers = new Set(data.map(r => r.player_name)).size;
                const totalDays = data.reduce((sum, r) => sum + r.days_survived, 0);
                const avgSurvival = totalRecords > 0 ? (totalDays / totalRecords).toFixed(1) : 0;
                const worldRecord = totalRecords > 0 ? Math.max(...data.map(r => r.days_survived)) : 0;
                
                // Estimate active players (records from last 24 hours)
                const yesterday = new Date(Date.now() - 24 * 60 * 60 * 1000);
                const activePlayers = data.filter(r => new Date(r.achieved_at) > yesterday).length;

                document.getElementById('totalPlayers').textContent = uniquePlayers;
                document.getElementById('totalRecords').textContent = totalRecords;
                document.getElementById('worldRecord').textContent = worldRecord;
                document.getElementById('avgSurvival').textContent = avgSurvival;
                document.getElementById('totalDays').textContent = totalDays.toLocaleString();
                document.getElementById('activePlayers').textContent = activePlayers;

            } catch (error) {
                loadingMsg.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Failed to load statistics: ' + error.message;
            }
        }

        function refreshStats() {
            fetchStats();
        }

        // Load statistics on page load
        window.onload = fetchStats;
    </script>
</body>
</html>
