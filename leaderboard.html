<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feral Pursuit - Leaderboard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            background-image: radial-gradient(circle at center, #1a0a0a 0%, #000000 100%);
            color: #e0e0e0;
            font-family: 'Lato', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .background-fx {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/dark-matter.png');
            opacity: 0.3;
            animation: pulseBg 10s infinite alternate;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 900px;
            width: 90%;
            text-align: center;
            padding: 40px;
            border: 2px solid #500;
            background-color: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.3);
            border-radius: 4px;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: #ff4500;
            font-size: 3em;
            text-shadow: 0 0 15px rgba(255, 69, 0, 0.7);
            margin-bottom: 30px;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .leaderboard-table th {
            font-family: 'Cinzel', serif;
            color: #ffd700;
            padding: 15px;
            border-bottom: 2px solid #ffd700;
            font-size: 1.2em;
        }

        .leaderboard-table td {
            padding: 15px;
            border-bottom: 1px solid #333;
            font-size: 1.1em;
        }

        .rank-1 { color: #ffd700; font-weight: bold; }
        .rank-2 { color: #c0c0c0; font-weight: bold; }
        .rank-3 { color: #cd7f32; font-weight: bold; }

        .loading {
            color: #888;
            font-size: 1.2em;
            padding: 40px;
        }

        .error {
            color: #ff6347;
            font-size: 1.2em;
            padding: 40px;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #300;
            color: #fff;
            text-decoration: none;
            font-family: 'Cinzel', serif;
            font-size: 1.2em;
            border: 2px solid #ff4500;
            border-radius: 5px;
            transition: all 0.3s ease-in-out;
            cursor: pointer;
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.05);
            background-color: #ff4500;
            color: #000;
        }

        @keyframes pulseBg {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="background-fx"></div>
    <div class="container">
        <h1>🏆 HALL OF FAME 🏆</h1>
        
        <div id="loadingMessage" class="loading">Loading legendary hunters...</div>
        <div id="errorMessage" class="error" style="display: none;"></div>
        
        <table class="leaderboard-table" id="leaderboardTable" style="display: none;">
            <thead>
                <tr>
                    <th>RANK</th>
                    <th>HUNTER</th>
                    <th>DAYS SURVIVED</th>
                    <th>ACHIEVED</th>
                </tr>
            </thead>
            <tbody id="leaderboardBody"></tbody>
        </table>

        <div class="btn-group">
            <a href="index.html" class="btn">Return to Main Menu</a>
            <button class="btn" onclick="refreshLeaderboard()">Refresh</button>
        </div>
    </div>

    <script>
        async function fetchLeaderboard() {
            const loadingMsg = document.getElementById('loadingMessage');
            const errorMsg = document.getElementById('errorMessage');
            const table = document.getElementById('leaderboardTable');
            const tbody = document.getElementById('leaderboardBody');

            loadingMsg.style.display = 'block';
            errorMsg.style.display = 'none';
            table.style.display = 'none';

            try {
                const response = await fetch('/api/leaderboard');
                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error);
                }

                loadingMsg.style.display = 'none';
                table.style.display = 'table';

                tbody.innerHTML = '';
                
                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center; color: #888;">No records yet. Be the first!</td></tr>';
                    return;
                }

                data.forEach((entry, index) => {
                    const row = document.createElement('tr');
                    const rankClass = index < 3 ? `rank-${index + 1}` : '';
                    const date = new Date(entry.achieved_at).toLocaleDateString();
                    
                    row.innerHTML = `
                        <td class="${rankClass}">#${index + 1}</td>
                        <td class="${rankClass}">${entry.player_name}</td>
                        <td class="${rankClass}">${entry.days_survived}</td>
                        <td style="color: #888;">${date}</td>
                    `;
                    tbody.appendChild(row);
                });

            } catch (error) {
                loadingMsg.style.display = 'none';
                errorMsg.style.display = 'block';
                errorMsg.textContent = 'Failed to load leaderboard: ' + error.message;
            }
        }

        function refreshLeaderboard() {
            fetchLeaderboard();
        }

        // Load leaderboard on page load
        window.onload = fetchLeaderboard;
    </script>
</body>
</html>
